<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0314" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Carta ❤</title>
    <link rel="icon" type="image/png" href="assets/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- só as famílias usadas (Caveat + Poppins), sem bloquear a primeira pintura -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Caveat:wght@500;600;700&display=swap"
        rel="stylesheet"
    /></noscript>
    <link rel="stylesheet" href="main.css?v=4" />
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <canvas id="hearts-canvas"></canvas>

    <a href="index.html" class="back-btn">← voltar</a>
    <!-- ícone embutido: dispensa baixar a biblioteca lucide inteira -->
    <button
      class="music-btn"
      id="music-btn"
      title="Música"
      aria-label="Tocar ou pausar música"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M9 18V5l12-2v13" />
        <circle cx="6" cy="18" r="3" />
        <circle cx="18" cy="16" r="3" />
      </svg>
    </button>

    <main class="page">
      <div class="carta-wrap">
        <div class="carta-paper">
          <span class="salutation" id="salutation"></span>
          <span id="body"></span><span class="cursor" id="cursor"></span>
          <span class="signature" id="signature"></span>
        </div>

        <div class="carta-footer" id="footer">
          <a href="index.html" class="btn-primary">← voltar ao início</a>
        </div>
      </div>
    </main>

    <p class="skip-hint" id="skip-hint">toque na tela pra acelerar</p>

    <script src="presentation.js?v=4"></script>
    <script src="background.js?v=4"></script>
    <script src="music.js?v=4"></script>
    <script>
      (function () {
        // ── Conteúdo da carta — edite à vontade ──────────────────────────────────
        var SALUTATION =
          "Aline, canjica cremosa com leite condensado e paçoca, meu amor";

        var BODY = [
          "Vc me enfeitiçou desde de q vi a sua primeira foto",
          "deve ter feito uma amarração ou algo assim",
          "",
          "Me deixou apaixonado por você e nao tem uma hr que eu não pense em você, mesmo q seja por um segundo",
          "",
          "Desde o começo tive receio de me envolver e confiar em vc, mas tem alguma coisa em você que me fez querer tentar",
          "Eu espero q eu tenha conseguido te mostrar o quanto eu me importo e o quanto eu quero cuidar de você, mesmo com minhas falhas",
          "",
          "Tudo que você faz eu acho muito fofo e muito especial, desde o jeito q vc segura minha mao até vc arrumando a sua caminha",
          "",
          "Com você até os dias comuns ficam diferentes. e acho impressionate como voce faz questao de querer me ver mesmo no meio da semana",
          "",
          "Você me trouxe uma felicidade que eu não esperava encontrar, e mesmo quando as coisas não são perfeitas, eu continuo tendo a certeza de que vale a pena estar com você.",
          "",
          "Obrigado por existir na minha vida, por me fazer sorrir e por tornar meu dia mais leve.",
          "",
        ].join("\n");

        var SIGNATURE = "— Kitto"; // ← TROQUE PELO SEU NOME antes de mandar!
        // ─────────────────────────────────────────────────────────────────────────

        var salEl = document.getElementById("salutation");
        var bodyEl = document.getElementById("body");
        var cursor = document.getElementById("cursor");
        var sigEl = document.getElementById("signature");
        var footer = document.getElementById("footer");
        var hint = document.getElementById("skip-hint");

        var SALUTATION_DELAY = 400; // ms até a saudação começar
        var BODY_DELAY = 900; // ms entre saudação e corpo
        var CHAR_BASE = 36; // ms por caractere
        var PAUSE_COMMA = 180; // pausa extra em vírgula/travessão
        var PAUSE_PERIOD = 280; // pausa extra em ponto/!/?
        var PAUSE_NEWLINE = 320; // pausa extra em quebra de linha

        // ── Aceleração por toque ────────────────────────────────────────
        var SPEED = 1; // 1 = normal; menor = mais rápido
        var INSTANT = false; // true = mostra tudo de uma vez
        var finished = false;
        var pending = null; // timer pendente, pra poder furar a fila

        function wait(ms, fn) {
          if (INSTANT) {
            fn();
            return;
          }
          var entry = { fn: fn };
          entry.id = setTimeout(function () {
            if (pending === entry) pending = null;
            fn();
          }, ms * SPEED);
          pending = entry;
        }

        function flushPending(delay) {
          if (!pending) return;
          clearTimeout(pending.id);
          var f = pending.fn;
          pending = null;
          if (delay) setTimeout(f, delay);
          else f();
        }

        function accelerate() {
          if (finished) return;
          if (SPEED === 1 && !INSTANT) {
            SPEED = 0.22;
            flushPending(40);
            if (hint) hint.textContent = "toque de novo pra mostrar tudo";
          } else if (!INSTANT) {
            INSTANT = true;
            if (hint) hint.classList.add("off");
            flushPending(0);
          }
        }

        /* bindTap (presentation.js) cobre iOS antigo sem Pointer Events */
        window.bindTap(document, function (e) {
          if (e.target.closest && e.target.closest("a, button")) return;
          accelerate();
        });

        setTimeout(function () {
          if (!finished && !INSTANT && hint) hint.classList.add("on");
        }, 2200);
        // ────────────────────────────────────────────────────────────────

        function typeText(target, text, onDone) {
          var i = 0;
          function putChar() {
            var ch = text[i++];
            if (ch === "\n") target.appendChild(document.createElement("br"));
            else target.appendChild(document.createTextNode(ch));
            return ch;
          }
          function next() {
            if (INSTANT) {
              while (i < text.length) putChar();
              if (onDone) onDone();
              return;
            }
            if (i >= text.length) {
              if (onDone) onDone();
              return;
            }
            var ch = putChar();
            var delay = CHAR_BASE;
            if (ch === "\n") delay += PAUSE_NEWLINE;
            else if (ch === "," || ch === "—") delay += PAUSE_COMMA;
            else if (ch === "." || ch === "!" || ch === "?")
              delay += PAUSE_PERIOD;
            wait(delay, next);
          }
          next();
        }

        // Fase 1: saudação
        wait(SALUTATION_DELAY, function () {
          typeText(salEl, SALUTATION, function () {
            // Fase 2: corpo
            wait(BODY_DELAY, function () {
              typeText(bodyEl, BODY, function () {
                // Fase 3: some o cursor, entra a assinatura
                cursor.style.display = "none";
                wait(400, function () {
                  typeText(sigEl, SIGNATURE, function () {
                    // Fase 4: botão de voltar
                    wait(600, function () {
                      finished = true;
                      if (hint) hint.classList.add("off");
                      footer.classList.add("show");
                    });
                  });
                });
              });
            });
          });
        });
      })();
    </script>
  </body>
</html>
