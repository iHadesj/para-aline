<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0314">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Coração ❤</title>
  <link rel="icon" type="image/png" href="assets/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- só Poppins (única família usada), carregada sem bloquear a primeira pintura -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"></noscript>
  <!-- ?v=4 força o iPhone a baixar a versão nova em vez de usar o cache -->
  <link rel="stylesheet" href="main.css?v=4">
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <a href="index.html" class="back-btn">← voltar</a>
  <button class="music-btn" id="music-btn" title="Música" aria-label="Tocar ou pausar música">
    <!-- ícone embutido: dispensa baixar a biblioteca lucide inteira nesta página -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </button>

  <div class="love-stage" id="love-stage">
    <canvas id="love-canvas"></canvas>
  </div>

  <p class="love-hint" id="love-hint">toque no coração ✨</p>

  <script src="presentation.js?v=4"></script>
  <script src="music.js?v=4"></script>
  <script>
  (function () {
    /* ── Diagnóstico: abra com ?fps no fim da URL ───────────────────
       Criado ANTES de tudo, então aparece mesmo se algo quebrar depois.
       Qualquer erro de JS também é mostrado na tela em vez de morrer
       em silêncio (essencial pra debugar num iPhone sem console). */
    var fpsEl = null, fpsCount = 0, fpsT0 = 0;
    var DEBUG = /[?&]fps/.test(location.search);
    if (DEBUG) {
      fpsEl = document.createElement('div');
      fpsEl.style.cssText = 'position:fixed;left:10px;bottom:10px;z-index:9999;' +
        'font:12px/1.4 monospace;color:#7fff9f;background:rgba(0,0,0,.65);' +
        'padding:4px 9px;border-radius:8px;pointer-events:none';
      fpsEl.textContent = 'carregando…';
      document.body.appendChild(fpsEl);

      window.onerror = function (msg, src, line) {
        var box = document.createElement('div');
        box.style.cssText = 'position:fixed;left:10px;top:70px;right:10px;z-index:9999;' +
          'font:11px/1.5 monospace;color:#ffb3b3;background:rgba(60,0,0,.85);' +
          'padding:8px 10px;border-radius:8px;word-break:break-all';
        box.textContent = 'ERRO: ' + msg + ' @ ' + (src || '').split('/').pop() + ':' + line;
        document.body.appendChild(box);
      };
    }

    var reduceMotion = window.matchMedia &&
      window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    var stage  = document.getElementById('love-stage');
    var canvas = document.getElementById('love-canvas');
    var hintEl = document.getElementById('love-hint');
    var ctx    = canvas.getContext('2d');
    if (!ctx) {
      if (fpsEl) fpsEl.textContent = 'sem contexto 2d (memória de canvas esgotada?)';
      return;
    }

    stage.style.touchAction = 'manipulation';

    // Celular renderiza em 1x: as partículas são bolinhas de brilho difusas,
    // resolução retina aqui só multiplica pixel sem ninguém notar a diferença
    var isPhone = Math.min(screen.width, screen.height) < 520;

    /* hardware fraco nem sempre é celular pequeno: tablet barato, notebook
       antigo e celular em "modo desktop" reportam tela grande. Poucos núcleos
       ou pouca RAM → começa no modo leve também */
    var weakHW = (navigator.hardwareConcurrency || 8) <= 4 ||
                 (navigator.deviceMemory || 8) <= 4;
    var lowEnd = isPhone || weakHW;

    var DPR = lowEnd ? 1 : Math.min(window.devicePixelRatio || 1, 1.5);

    /* O blending aditivo ('lighter') é o que deixa o brilho somando onde as
       bolinhas se sobrepõem — só que em GPU fraca ele pode derrubar o canvas
       pro renderizador de CPU e travar tudo. Hardware fraco fica sem ele. */
    var ADDITIVE = !lowEnd;

    var W, H, S, CY, CX;
    var particles = [];
    var sparkles  = [];
    var running   = true;
    var rafId     = null;
    var lastBurst = 0;

    // ── Ajustes finos ──────────────────────────────────────────────
    var SPRING   = 0.014;  // força que puxa cada partícula pro lugar
    var DAMP     = 0.86;   // amortecimento (quanto menor, mais "gelatina")
    var BEAT_MS  = 1250;   // duração de um batimento completo
    var BEAT_AMP = 0.062;  // quanto o coração "incha" no batimento
    // ───────────────────────────────────────────────────────────────

    var COLORS  = ['#ff4d7d', '#ff7aa2', '#ffa3bd', '#ff2e63', '#ffd9e4'];
    var SPRITES = COLORS.map(makeDotSprite);
    var GOLD    = SPRITES.push(makeDotSprite('#ffd9a0')) - 1;

    /* Safari desenha ImageBitmap bem mais rápido que canvas→canvas;
       enquanto a conversão não termina, os canvas servem de reserva */
    if (window.createImageBitmap) {
      SPRITES.forEach(function (c, i) {
        createImageBitmap(c).then(function (bmp) { SPRITES[i] = bmp; })
          .catch(function () { /* fica no canvas mesmo */ });
      });
    }

    function makeDotSprite(color) {
      var s = document.createElement('canvas');
      s.width = s.height = 64;
      var c = s.getContext('2d');
      var g = c.createRadialGradient(32, 32, 0, 32, 32, 32);
      g.addColorStop(0,    'rgba(255,255,255,1)');
      g.addColorStop(0.22, color);
      g.addColorStop(0.55, hexToRgba(color, 0.34));
      g.addColorStop(1,    'rgba(0,0,0,0)');
      c.fillStyle = g;
      c.fillRect(0, 0, 64, 64);
      return s;
    }

    function hexToRgba(hex, a) {
      var n = parseInt(hex.slice(1), 16);
      return 'rgba(' + (n >> 16 & 255) + ',' + (n >> 8 & 255) + ',' + (n & 255) + ',' + a + ')';
    }

    // Curva paramétrica do coração
    function heartXY(t) {
      return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
      };
    }

    function layout() {
      W = window.innerWidth;
      H = window.innerHeight;
      /* teto de pixels do canvas: tela grande + retina explode o custo de
         preenchimento por frame (ex.: 1920×1080 em 1.5x = 4.7M pixels) */
      var px = W * H * DPR * DPR;
      if (px > 2.4e6) DPR = Math.max(1, Math.sqrt(2.4e6 / (W * H)));

      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

      // escala do coração: cabe na largura e na altura, com teto
      S  = Math.min((W * 0.84) / 32, (H * 0.46) / 29, 13);
      CX = W / 2;
      CY = H * 0.45 - 2.5 * S; // centro visual do coração em 45% da tela
    }

    function particleCount() {
      /* hardware fraco começa com teto menor: o watchPerf corta depois,
         mas melhor já nascer leve num aparelho fraco */
      var cap = lowEnd ? 170 : 280;
      var min = lowEnd ? 110 : 130;
      return Math.max(min, Math.min(cap, Math.floor((W * H) / 2400)));
    }

    function buildTargets(count) {
      var targets = [];
      var outline = Math.floor(count * 0.5);
      var i, t, p, r;

      for (i = 0; i < outline; i++) {
        t = (Math.PI * 2 * i) / outline + (Math.random() - 0.5) * 0.04;
        p = heartXY(t);
        r = 0.96 + Math.random() * 0.05;
        targets.push({ x: p.x * S * r, y: p.y * S * r });
      }
      for (i = outline; i < count; i++) {
        t = Math.random() * Math.PI * 2;
        p = heartXY(t);
        r = Math.sqrt(Math.random()) * 0.92;
        targets.push({ x: p.x * S * r, y: p.y * S * r });
      }
      return targets;
    }

    function initParticles() {
      var targets = buildTargets(particleCount());
      particles = targets.map(function (tg) {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 2,
          vy: (Math.random() - 0.5) * 2,
          tx: tg.x, ty: tg.y,
          size: 3.6 + Math.random() * 4.2,
          si: (Math.random() * COLORS.length) | 0,
          phase: Math.random() * Math.PI * 2,
          wob: 1.4 + Math.random() * 1.6
        };
      });

      sparkles = [];
      for (var i = 0; i < (lowEnd ? 8 : 12); i++) {
        sparkles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          size: 1.5 + Math.random() * 2.5,
          phase: Math.random() * Math.PI * 2,
          speed: 0.0012 + Math.random() * 0.0014
        });
      }
    }

    function retarget() {
      var targets = buildTargets(particles.length);
      for (var i = 0; i < particles.length; i++) {
        particles[i].tx = targets[i].x;
        particles[i].ty = targets[i].y;
      }
    }

    /* ── Plano B automático: mede os primeiros frames e, se o aparelho
       estiver perdendo muitos, corta partícula na metade e engorda as
       que sobram — o coração continua cheio, só que leve.
       Importante: num aparelho a 5fps, esperar 110 frames levaria 22s
       de tela travada. Por isso o atalho: 4 frames catastróficos
       (>90ms) já degradam na hora, sem esperar a amostra completa. ── */
    var ftFrames = 0, ftSlow = 0, ftBad = 0, ftLast = 0, ftDone = false, ftRounds = 0;
    function watchPerf(now) {
      if (ftLast) {
        ftFrames++;
        var d = now - ftLast;
        if (d > 26) ftSlow++; // frame de 60fps estourado com folga
        if (d > 90) ftBad++;  // travada braba
      }
      ftLast = now;
      var emergency = ftBad >= 4;
      if (emergency || ftFrames >= 110) {
        if ((emergency || ftSlow > ftFrames * 0.35) && ftRounds < 2) {
          ftRounds++;
          degrade();
          ftFrames = 0; ftSlow = 0; ftBad = 0; ftLast = 0; // mede de novo já degradado
        } else if (ftFrames >= 110) {
          ftDone = true;
        }
      }
    }

    function degrade() {
      ADDITIVE = false; // primeira coisa a sair: blending aditivo
      var keep = Math.max(60, (particles.length / 2) | 0);
      particles.length = keep;
      sparkles.length  = ftRounds > 1 ? 0 : Math.min(sparkles.length, 8);
      var targets = buildTargets(keep);
      for (var i = 0; i < keep; i++) {
        particles[i].tx = targets[i].x;
        particles[i].ty = targets[i].y;
        particles[i].size *= 1.3;
      }
    }

    // Batimento: dois pulsos por ciclo (tum… tum)
    function beat(ms) {
      var x = (ms % BEAT_MS) / BEAT_MS;
      return Math.exp(-Math.pow((x - 0.10) / 0.045, 2)) +
             0.5 * Math.exp(-Math.pow((x - 0.28) / 0.060, 2));
    }

    function tick(now) {
      if (!running) return;
      rafId = requestAnimationFrame(tick);
      if (!ftDone) watchPerf(now);

      if (fpsEl) {
        fpsCount++;
        if (now - fpsT0 > 500) {
          fpsEl.textContent = Math.round(fpsCount * 1000 / (now - fpsT0)) + ' fps · ' +
            particles.length + ' pts · dpr ' + DPR + (ADDITIVE ? '' : ' · lite');
          fpsT0 = now;
          fpsCount = 0;
        }
      }

      var b = beat(now);
      var scale = 1 + BEAT_AMP * b;
      var glow  = 1 + 0.55 * b;

      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = ADDITIVE ? 'lighter' : 'source-over';

      // sparkles douradas ambiente
      for (var s = 0; s < sparkles.length; s++) {
        var sk = sparkles[s];
        var a = 0.18 + 0.30 * (0.5 + 0.5 * Math.sin(now * sk.speed + sk.phase));
        ctx.globalAlpha = a;
        var d0 = sk.size * 3.4;
        ctx.drawImage(SPRITES[GOLD], sk.x - d0 / 2, sk.y - d0 / 2, d0, d0);
      }

      // partículas do coração
      ctx.globalAlpha = 1;
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];

        var wx = Math.sin(now * 0.0012 + p.phase) * p.wob;
        var wy = Math.cos(now * 0.0010 + p.phase) * p.wob;
        var ax = (CX + (p.tx * scale) + wx - p.x) * SPRING;
        var ay = (CY + (p.ty * scale) + wy - p.y) * SPRING;

        p.vx = (p.vx + ax) * DAMP;
        p.vy = (p.vy + ay) * DAMP;
        p.x += p.vx;
        p.y += p.vy;

        var d  = p.size * (2.4 + 1.1 * b) * (0.9 + 0.2 * Math.sin(now * 0.003 + p.phase));
        var dd = d * (glow * 0.6 + 0.4);
        ctx.drawImage(SPRITES[p.si], p.x - dd / 2, p.y - dd / 2, dd, dd);
      }
    }

    function explode(px, py) {
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        var dx = p.x - px;
        var dy = p.y - py;
        var d = Math.sqrt(dx * dx + dy * dy) + 0.001;
        var force = 26 * Math.exp(-d / 150) + 3 * Math.random();
        p.vx += (dx / d) * force + (Math.random() - 0.5) * 3;
        p.vy += (dy / d) * force - 2 + (Math.random() - 0.5) * 3;
      }
    }

    // ── Interação (bindTap cobre iOS antigo sem Pointer Events) ────
    window.bindTap(stage, function (e) {
      if (reduceMotion) return;
      var pt = e.changedTouches ? e.changedTouches[0] : e;
      explode(pt.clientX, pt.clientY);
      if (hintEl) hintEl.classList.add('hide');

      var now = Date.now();
      if (window.loveBurst && now - lastBurst > 900) {
        lastBurst = now;
        window.loveBurst(14);
      }
    });

    // ── Ciclo de vida ──────────────────────────────────────────────
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        running = false;
        if (rafId) cancelAnimationFrame(rafId);
      } else if (!reduceMotion) {
        running = true;
        ftLast = 0; // não conta a pausa como frame perdido
        rafId = requestAnimationFrame(tick);
      }
    });

    var resizeTimer = null;
    window.addEventListener('resize', function () {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function () {
        layout();
        retarget();
        if (reduceMotion) drawStatic();
      }, 120);
    });

    function drawStatic() {
      ctx.clearRect(0, 0, W, H);
      ctx.globalCompositeOperation = ADDITIVE ? 'lighter' : 'source-over';
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x = CX + p.tx;
        p.y = CY + p.ty;
        var d = p.size * 2.6;
        ctx.drawImage(SPRITES[p.si], p.x - d / 2, p.y - d / 2, d, d);
      }
    }

    layout();
    initParticles();

    if (reduceMotion) {
      drawStatic();
      if (hintEl) hintEl.classList.add('hide');
    } else {
      rafId = requestAnimationFrame(tick);
    }
  })();
  </script>
</body>
</html>
